name: Deploy Web App to GitHub Pages

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install pnpm
        run: npm install --global pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Determine Vite base path
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name_lower="$(printf '%s' "$repo_name" | tr '[:upper:]' '[:lower:]')"
          owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"

          if [ "$repo_name_lower" = "${owner_lower}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build wasm package
        run: wasm-pack build wasm --target web --release

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Build web app
        env:
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
        run: pnpm --dir web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
